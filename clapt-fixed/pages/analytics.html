<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analytics · CLAPT</title>
<link rel="stylesheet" href="../style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="brand"><span class="logo">◆</span> CLAPT</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="quiz.html">Quiz</a>
    <a href="analytics.html">Analytics</a>
    <a href="recommendations.html">Recommendations</a>
    <button id="themeToggle" class="ghost-btn">🌙</button>
  </div>
</div></nav>

<main class="page">
  <div class="flex-between">
    <div>
      <h1 class="page-title">Analytics</h1>
      <p class="page-sub">Performance trends, topic mastery and cognitive load history.</p>
    </div>
    <button id="dlBtn" class="btn primary">⬇ Download Report</button>
  </div>

  <div class="panels">
    <div class="panel"><h3>Topic Performance</h3><canvas id="chTopic" height="160"></canvas></div>
    <div class="panel"><h3>Difficulty Progression</h3><canvas id="chDiff" height="160"></canvas></div>
  </div>
  <div class="panels" style="margin-top:16px">
    <div class="panel"><h3>Score Trend</h3><canvas id="chTrend" height="140"></canvas></div>
    <div class="panel"><h3>Cognitive Load Over Time</h3><canvas id="chCog" height="140"></canvas></div>
  </div>

  <div class="panel" style="margin-top:16px">
    <div class="flex-between" style="margin-bottom:12px">
      <h3 style="margin:0">Quiz History</h3>
      <input id="searchInp" class="search" style="max-width:280px" placeholder="Search history..."/>
    </div>
    <table class="table" id="histTable">
      <thead><tr><th>Date</th><th>Score</th><th>%</th><th>Avg Time</th><th>Cog Load</th><th>Topics</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script src="../data/questions.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
<script>CLAPT_AUTH.requireLogin();</script>
<script src="../js/storage.js"></script>
<script src="../js/analytics.js"></script>
</body>
</html>
