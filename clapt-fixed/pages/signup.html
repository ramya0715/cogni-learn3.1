<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign up · CLAPT</title>
<link rel="stylesheet" href="../style.css"/></head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="brand"><span class="logo">◆</span> CLAPT</a>
  <div class="nav-links">
    <a href="../index.html">Home</a>
    <button id="themeToggle" class="ghost-btn">🌙</button>
  </div>
</div></nav>

<main class="page" style="max-width:480px;margin:60px auto">
  <div class="panel" style="padding:32px">
    <h1 class="page-title" style="margin-bottom:6px">Create your account</h1>
    <p class="page-sub" style="margin-bottom:22px">Your progress, history & achievements stay tied to your account on this device.</p>
    <form id="signupForm" class="auth-form">
      <label>Display name
        <input type="text" id="displayName" required placeholder="e.g. Alex K." maxlength="40"/>
      </label>
      <label>Username
        <input type="text" id="username" autocomplete="username" required placeholder="lowercase, 3+ chars" minlength="3" maxlength="30"/>
      </label>
      <label>Password
        <input type="password" id="password" autocomplete="new-password" required placeholder="min 6 characters" minlength="6"/>
      </label>
      <label>Confirm password
        <input type="password" id="password2" autocomplete="new-password" required placeholder="repeat password" minlength="6"/>
      </label>
      <label class="remember-row"><input type="checkbox" id="rememberMe" checked/> Remember this account on this device</label>
      <div id="err" class="auth-err"></div>
      <button type="submit" class="btn primary" style="width:100%">Create account →</button>
    </form>
    <p style="margin-top:18px;text-align:center" class="muted">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>
</main>

<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
<script>
(function(){
  if(CLAPT_AUTH.currentUser()){ location.replace('dashboard.html'); return; }
  const f=document.getElementById('signupForm');
  const err=document.getElementById('err');
  f.addEventListener('submit', async (e)=>{
    e.preventDefault(); err.textContent='';
    if(password.value !== password2.value){ err.textContent='Passwords do not match.'; return; }
    try{
      await CLAPT_AUTH.register(username.value, password.value, displayName.value, rememberMe.checked);
      location.href='dashboard.html';
    }catch(ex){ err.textContent = ex.message; }
  });
})();
</script>
</body>
</html>
